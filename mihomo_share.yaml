base_provider: &base_provider { type: http, interval: 86400, health-check: { enable: true, url: "https://www.gstatic.com/generate_204", interval: 1800 } }
d_mrs: &d_mrs { type: http, interval: 86400, behavior: domain, format: mrs }
d_yaml: &d_yaml { type: http, interval: 86400, behavior: domain, format: yaml }
d_list: &d_list { type: http, interval: 86400, behavior: classical, format: text }
ip_mrs: &ip_mrs { type: http, interval: 86400, behavior: ipcidr, format: mrs }

mixed-port: 7892
tproxy-port: 7894
ipv6: true
find-process-mode: strict
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
global-ua: mihomo
mode: rule
log-level: warning
allow-lan: true
udp: true
unified-delay: true
tcp-concurrent: true
etag-support: true
disable-keep-alive: false
keep-alive-idle: 240
keep-alive-interval: 60
profile:
  store-selected: true
  store-fake-ip: true

