  - name: 🎮 Games
    type: select
    proxies: [🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,DIRECT]

  - name: 📲 Telegram
    type: select
    proxies: [🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,DIRECT]

  - name: 📟 Twitter
    type: select
    proxies: [🇯🇵 日本,🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区]

  - name: 🎬 YouTube
    type: select
    proxies: [🇸🇬 新加坡,🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇨🇳 台湾,🌍 其它地区]

  - name: 🚀 网速测试
    type: select
    proxies: [DIRECT,🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区]

  - name: 🚫 广告净化
    type: select
    proxies: [REJECT-DROP,REJECT,DIRECT]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,DIRECT]

  - name: 🧱 国内
    type: select
    proxies: [DIRECT,🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区]

  - name: 🌐 国外
    type: select
    proxies: [🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,DIRECT]

  - name: 🇭🇰 香港
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)香港|🇭🇰|hk|hongkong|hong kong"

  - name: 🇭🇰 香港sub
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)香港|🇭🇰|hk|hongkong|hong kong"

  - name: 🇺🇸 美国
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美国|🇺🇸|us|unitedstates|united states"

  - name: 🇺🇸 美国sub
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美国|🇺🇸|us|unitedstates|united states"

  - name: 🇯🇵 日本
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)日本|🇯🇵|jp|japan"

  - name: 🇸🇬 新加坡
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(新加坡|🇸🇬|sg|singapore)"

  - name: 🇨🇳 台湾
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)台|TPE|tw|taiwan"

  - name: 🌍 其它地区
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:剩余流量|下次重置|套餐到期|更新订阅|🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|香港|hk|hongkong|台湾|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|美国|us|unitedstates)).*"

  - name: 🔌 STUN
    type: select
    proxies: [DIRECT,🇭🇰 香港,🇯🇵 日本,🇺🇸 美国,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,REJECT]

  - name: 🟢 直连
    type: select
    proxies: [DIRECT]
    hidden: true

sub-rules:
  quic-logic:
    - RULE-SET,aisuite,REJECT
    - OR,((RULE-SET,cn),(RULE-SET,cn_ip,no-resolve)),🟢 直连
    - OR,((RULE-SET,youtube),(RULE-SET,youtube_ip,no-resolve)),REJECT
    - OR,((RULE-SET,google),(RULE-SET,google_ip,no-resolve)),REJECT
    - MATCH,PASS
  stun-logic:
    - OR,((DOMAIN-KEYWORD,stun),(DOMAIN-KEYWORD,turn)),🔌 STUN
    - OR,((RULE-SET,stun),(RULE-SET,stun_ip,no-resolve)),🔌 STUN
    - MATCH,PASS
  gms-fcm:
    - DOMAIN-SUFFIX,mtalk.google.com,🟢 直连
    - DOMAIN-REGEX,.*.mtalk.google.com,🟢 直连
    - DOMAIN-REGEX,(^|\\.)(alt[1-8]-mtalk|mtalk|mtalk4)\\.google\\.com$,🟢 直连
    - MATCH,PASS

rules:
- DOMAIN-REGEX,^beauty-.*-live\.meituan\.net$,🚫 广告净化
- OR,((RULE-SET,chiao_adrules),(RULE-SET,chiao_adrules_ip,no-resolve)),🚫 广告净化
- OR,((DST-PORT,123),(DST-PORT,6881-6889)),🟢 直连
- OR,((RULE-SET,direct),(RULE-SET,private),(RULE-SET,private_ip,no-resolve)),🟢 直连

- SUB-RULE,(AND,((NETWORK,UDP),(DST-PORT,443))),quic-logic
- SUB-RULE,(AND,((NETWORK,UDP),(DST-PORT,3478-3481,5349,19302))),stun-logic
- SUB-RULE,(DST-PORT,5222,5228-5230),gms-fcm

- OR,((RULE-SET,WeChat),(RULE-SET,WeChat_ip,no-resolve)),🧱 国内
- OR,((RULE-SET,download),(RULE-SET,download_ip,no-resolve)),🟢 直连
- DOMAIN-SUFFIX,push.apple.com,🟢 直连
- DOMAIN-SUFFIX,courier-push-apple.com.akadns.net,🟢 直连
- RULE-SET,aisuite,🤖 AI
- RULE-SET,networktest,🚀 网速测试

- DOMAIN-SUFFIX,podcasts.apple.com,🍎 Apple Proxy
- OR,((RULE-SET,appletv),(RULE-SET,applemusic)),🍎 Apple 媒体
- OR,((RULE-SET,AppleAPI-DOMAIN),(RULE-SET,AppleAPI-IP,no-resolve)),🍎 Apple Proxy
- RULE-SET,AppleDomainNoCDN,🍎 Apple Proxy
- RULE-SET,AppleDomainCDN,🍎 Apple
- RULE-SET,AppleDomain,🍎 Apple

- DOMAIN,redirector.c.play.google.com,🧱 国内
- DOMAIN-REGEX,^r[0-9]+(\.|\-+)sn-(2x3|ni5|j5o)\w{5}\.googlevideo\.com$,🧱 国内
- DOMAIN-REGEX,^r[0-9]+(\.|\-+)sn-(2x3|ni5|j5o)\w{5}\.xn--ngstr-lra8j\.com$,🧱 国内
- DOMAIN-REGEX,^[a-z0-9-]+-intl\.biligame\.net$,🎮 Games
- DOMAIN-REGEX,^.*trickcal.*\.bilibiligame\.net$,🎮 Games
- RULE-SET,mahjong,🎮 GamesCN
- RULE-SET,games-cn,🎮 GamesCN
- OR,((RULE-SET,games),(RULE-SET,games_ip,no-resolve)),🎮 Games
- RULE-SET,microsoft,🖥 Microsoft
- OR,((RULE-SET,youtube),(RULE-SET,youtube_ip,no-resolve)),🎬 YouTube
- OR,((RULE-SET,google),(RULE-SET,google_ip,no-resolve)),🌐 Google
- OR,((RULE-SET,twitter),(RULE-SET,twitter_ip,no-resolve)),📟 Twitter
- OR,((RULE-SET,telegram),(RULE-SET,telegram_ip,no-resolve)),📲 Telegram
- OR,((RULE-SET,meta),(RULE-SET,facebook),(RULE-SET,facebook_ip,no-resolve)),♾️ Meta
- OR,((RULE-SET,cloudflare),(RULE-SET,proxy),(RULE-SET,proxy_ip,no-resolve)),🌐 国外
- OR,((RULE-SET,cn),(RULE-SET,cn_ip,no-resolve)),🧱 国内
- MATCH,🐟 漏网之鱼

