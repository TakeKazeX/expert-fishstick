  - name: 🧱 国内
    type: select
    proxies: [DIRECT,🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区]

  - name: 🌐 国外
    type: select
    proxies: [🇭🇰 香港,🇭🇰 香港sub,🇺🇸 美国,🇺🇸 美国sub,🇯🇵 日本,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,DIRECT]

  - name: 🇭🇰 香港
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)香港|🇭🇰|hk|hongkong|hong kong"

  - name: 🇭🇰 香港sub
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)香港|🇭🇰|hk|hongkong|hong kong"

  - name: 🇺🇸 美国
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美国|🇺🇸|us|unitedstates|united states"

  - name: 🇺🇸 美国sub
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美国|🇺🇸|us|unitedstates|united states"

  - name: 🇯🇵 日本
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)日本|🇯🇵|jp|japan"

  - name: 🇸🇬 新加坡
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(新加坡|🇸🇬|sg|singapore)"

  - name: 🇨🇳 台湾
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)台|TPE|tw|taiwan"

  - name: 🌍 其它地区
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:剩余流量|下次重置|套餐到期|更新订阅|🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|香港|hk|hongkong|台湾|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|美国|us|unitedstates)).*"

  - name: 🔌 STUN
    type: select
    proxies: [DIRECT,🇭🇰 香港,🇯🇵 日本,🇺🇸 美国,🇸🇬 新加坡,🇨🇳 台湾,🌍 其它地区,REJECT]

sub-rules:
  quic-logic:
    - RULE-SET,cn,DIRECT
    - RULE-SET,cn_ip,DIRECT
    - DOMAIN-SUFFIX,podcasts.apple.com,🍎 Apple Proxy
    - OR,((RULE-SET,appletv),(RULE-SET,applemusic)),🍎 Apple 媒体
    - OR,((RULE-SET,AppleAPI-DOMAIN),(RULE-SET,AppleAPI-IP,no-resolve)),🍎 Apple Proxy
    - RULE-SET,AppleDomainNoCDN,🍎 Apple Proxy
    - RULE-SET,AppleDomainCDN,🍎 Apple
    - RULE-SET,AppleDomain,🍎 Apple
    - RULE-SET,microsoft,🖥 Microsoft
    - MATCH,REJECT
  gms-fcm:
    - DOMAIN,mtalk.google.com,DIRECT
    - DOMAIN-REGEX,^alt[1-9]-mtalk\.google\.com$,DIRECT
    - DOMAIN-KEYWORD,mtalk,DIRECT
    - AND,((IP-ASN,15169),(DST-PORT,5222-5230)),DIRECT
    - MATCH,DIRECT
  stun-logic:
    - DOMAIN-KEYWORD,stun,🔌 STUN
    - DOMAIN-KEYWORD,turn,🔌 STUN
    - RULE-SET,stun,🔌 STUN
    - RULE-SET,stun_ip,🔌 STUN,no-resolve
    - MATCH,🔌 STUN

rules:
- OR,((DST-PORT,123),(DST-PORT,6881-6889)),DIRECT
- OR,((RULE-SET,direct),(RULE-SET,private),(RULE-SET,private_ip,no-resolve)),DIRECT
- SUB-RULE,(AND,((NETWORK,UDP),(DST-PORT,443))),quic-logic
- SUB-RULE,(AND,((NETWORK,UDP),(DST-PORT,3478-3481,5349,19302))),stun-logic
- SUB-RULE,(AND,((DST-PORT,443,5222,5228-5230),(DOMAIN-KEYWORD,mtalk))),gms-fcm

- IP-CIDR,95.161.76.100/31,REJECT-DROP,no-resolve
- RULE-SET,AWAvenue-Ads-Rule,🚫 广告
- OR,((RULE-SET,httpdns),(RULE-SET,httpdns_ip,no-resolve)),REJECT
- DOMAIN-REGEX,^beauty-.*-live\.meituan\.net$,REJECT

- OR,((RULE-SET,WeChat),(RULE-SET,WeChat_ip,no-resolve)),DIRECT
- OR,((DOMAIN-SUFFIX,push.apple.com),(DOMAIN-SUFFIX,courier-push-apple.com.akadns.net)),DIRECT
- RULE-SET,aisuite,🤖 AI
- DOMAIN-SUFFIX,podcasts.apple.com,🍎 Apple Proxy
- OR,((RULE-SET,appletv),(RULE-SET,applemusic)),🍎 Apple 媒体
- OR,((RULE-SET,AppleAPI-DOMAIN),(RULE-SET,AppleAPI-IP,no-resolve)),🍎 Apple Proxy
- RULE-SET,AppleDomainNoCDN,🍎 Apple Proxy
- RULE-SET,AppleDomainCDN,🍎 Apple
- RULE-SET,AppleDomain,🍎 Apple

- DOMAIN-REGEX,^[a-z0-9-]+-intl\.biligame\.net$,🎮 Games
