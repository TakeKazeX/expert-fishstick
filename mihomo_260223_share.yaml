sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

dns:
  enable: true
  ipv6: true
  cache-algorithm: arc
  use-hosts: true
  respect-rules: false
  prefer-h3: true
  listen: 0.0.0.0:1053
  default-nameserver:
    - https://223.5.5.5/dns-query
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fd00::/18
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,fakeip-filter,real-ip
    - RULE-SET,direct,real-ip
    - RULE-SET,private,real-ip
    - DOMAIN-REGEX,^(stun|turn)\..*$,real-ip
    - DOMAIN-REGEX,^.*(\.stun\.|\.turn\.).*$,real-ip
    - DOMAIN,mtalk.google.com,real-ip
    - DOMAIN-REGEX,^alt[1-8]-mtalk\.google\.com$,real-ip
    - DOMAIN-KEYWORD,mtalk,real-ip
    - RULE-SET,stun,real-ip
    - RULE-SET,PrivateTracker,real-ip
    - RULE-SET,networktest,real-ip
    - RULE-SET,WeChat,real-ip
    - DOMAIN-SUFFIX,push.apple.com,real-ip
    - DOMAIN-SUFFIX,courier-push-apple.com.akadns.net,real-ip
    - RULE-SET,aisuite,fake-ip
    - DOMAIN-SUFFIX,podcasts.apple.com,fake-ip
    - RULE-SET,appletv,real-ip
    - RULE-SET,applemusic,real-ip
    - RULE-SET,AppleAPI-DOMAIN,fake-ip
    - RULE-SET,AppleDomainNoCDN,fake-ip
    - RULE-SET,AppleDomainCDN,real-ip
    - RULE-SET,AppleDomain,real-ip
    - RULE-SET,microsoft,real-ip
    - RULE-SET,youtube,fake-ip
    - RULE-SET,twitter,fake-ip
    - RULE-SET,google,fake-ip
    - RULE-SET,telegram,fake-ip
    - RULE-SET,meta,fake-ip
    - RULE-SET,facebook,fake-ip
    - RULE-SET,Cloudflare,fake-ip
    - RULE-SET,Proxy,fake-ip
    - RULE-SET,cn,real-ip
    - MATCH,real-ip
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  nameserver-policy:
    "+.tv.apple.com": [101.101.101.101#disable-ipv6=true&skip-cert-verify=true]
    "RULE-SET:appletv": [101.101.101.101#disable-ipv6=true&skip-cert-verify=true]
    "RULE-SET:WeChat": [https://doh.pub/dns-query#disable-ipv6=true&skip-cert-verify=true]
    "RULE-SET:aisuite": [https://1.1.1.1/dns-query#disable-ipv6=true&skip-cert-verify=true]
    "RULE-SET:AWAvenue-Ads-Rule": [rcode://success]

